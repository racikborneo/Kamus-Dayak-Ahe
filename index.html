<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Nelsen Ahe — Kamus Dayak Modern</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-shell">
        <header class="main-header">
            <div class="brand">
                <div class="logo-wrapper"></div>
                <div class="brand-text">
                    <h1>Nelsen Ahe</h1>
                    <span class="status"><span class="dot"></span> Ahe | Kamus Dayak</span>
                </div>
            </div>
            <div class="actions">
                <button id="themeToggle" class="icon-btn" aria-label="Toggle Theme">
                    <svg class="sun" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
            </div>
        </header>

        <div id="installBanner" class="install-banner">
            <p>
                Gunakan Nelsen lebih cepat di layar utama
            </p>
            <button id="installBtn">Install</button>
        </div>

        <main id="chatBox" class="chat-viewport">
            <div class="system-msg">
                Selamat datang di Nelsen. Silakan ketik kata dalam Bahasa Indonesia atau Dayak.
            </div>
        </main>

        <footer class="input-container">
            <div id="suggestions" class="suggestion-bar"></div>
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Tulis sesuatu..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }
    </script>

    <script type="text/javascript" charset="utf-8">
        window.addEventListener("load", () => {
            swiftAlert(
                "Nelsen Kamus Dayak Ahe",
                "Halo, ini adalah Nelsen Kamus Dayak Ahe. Ketik kata atau kalimat, saya akan terjemahkan."
            );
        });
    </script>
</body>
</html>
